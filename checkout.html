<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <title>Checkout - CELENUE</title>
</head>
<body>
    <nav class="navbar" style="justify-content: center; display: flex;"> 
        <h1 class="logo" style="margin: 0;">CELENUE</h1>
    </nav>

    <div class="checkout-wrapper">
        <div class="checkout-form">
            <h2>Contact Information</h2>
            <div class="form-row">
                <div class="form-group"><label>Email</label><input type="email"></div>
                <div class="form-group"><label>Phone</label><input type="text"></div>
            </div>
            
            <h2>Shipping Address</h2>
            <div class="form-row">
                <div class="form-group"><label>First Name</label><input type="text"></div>
                <div class="form-group"><label>Last Name</label><input type="text"></div>
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label>Street Address</label><input type="text">
            </div>
            <div class="form-row">
                <div class="form-group"><label>City</label><input type="text"></div>
                <div class="form-group"><label>Postal Code</label><input type="text"></div>
            </div>
            
            <h2>Payment Method</h2>
            <div class="form-group">
                <select>
                    <option>Cash on Delivery (COD)</option>
                    <option>Credit Card</option>
                </select>
            </div>
            
            <button class="btnCheckout complete-order-btn" style="color:rgb(239, 239, 239); margin-top: 20px; margin-bottom: 20px; border-radius: 6px;">Complete Order</button>
        </div>

        <div class="checkout-summary">
            <h2>Order Summary</h2>
            <table class="summary-table">
                <tr><td>Subtotal</td><td>₱0.00</td></tr>
                <tr><td>Shipping fee</td><td>Free</td></tr>
                <tr><td><strong style="font-size:18px;">Total</strong></td><td><strong style="font-size:18px;">₱0.00</strong></td></tr>
            </table>
        </div>
    </div>

    <div class="bottom-footer" style="position: fixed; bottom: 0; width: 100%;">
        <p style="margin: 0;">© 2026 CELENUE Corporation. All Rights Reserved.</p>
    </div>

    <script src="products.js"></script>
    <script src="script.js"></script>
</body>
</html>
